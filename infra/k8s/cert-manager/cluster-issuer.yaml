# cert-manager ClusterIssuers for Let's Encrypt.
#
# Apply once per cluster (after installing cert-manager):
#   kubectl apply -f cluster-issuer.yaml
#
# Replace `you@example.com` with a real address — Let's Encrypt sends
# expiry notices there.
#
# `letsencrypt-staging` is the dry-run issuer with much higher rate
# limits — point your Ingress at it first to confirm the TLS handshake
# end-to-end, then switch to `letsencrypt-prod` for browser-trusted certs.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: you@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            # Match the IngressClass Traefik registers in the cluster.
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
