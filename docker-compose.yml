services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sautiledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sautiledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sautiledger
      AI_PROVIDER: mock
      SUBMISSION_HASH_SALT: local-dev-change-me
      SESSION_SECRET: local-dev-change-me
      CORS_ORIGIN: http://localhost:3000
      SERVE_STATIC_FRONTEND: "true"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
