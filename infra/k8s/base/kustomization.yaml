apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sautiledger

commonLabels:
  app.kubernetes.io/name: sautiledger
  app.kubernetes.io/part-of: sautiledger

resources:
  - namespace.yaml
  - configmap.yaml
  # Apply secrets out-of-band (see secret.example.yaml). Uncomment only
  # if you keep an encrypted/sealed version checked in.
  # - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  - name: ghcr.io/your-org/sautiledger
    newName: docker.io/wechuli/sautiledger
    newTag: latest
