# Template only — DO NOT COMMIT REAL SECRET VALUES.
#
# Apply this with real values out-of-band, e.g.:
#
#   kubectl -n sautiledger create secret generic sautiledger-secrets \
#     --from-literal=SUBMISSION_HASH_SALT="$(openssl rand -hex 32)" \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=INSTITUTION_DEMO_KEY="$(openssl rand -hex 16)" \
#     --from-literal=OPENAI_API_KEY=""
#
# Or manage with a sealed-secrets / external-secrets / SOPS workflow.
apiVersion: v1
kind: Secret
metadata:
  name: sautiledger-secrets
  namespace: sautiledger
type: Opaque
stringData:
  SUBMISSION_HASH_SALT: "replace-with-a-long-random-secret"
  SESSION_SECRET: "replace-with-a-long-random-secret"
  INSTITUTION_DEMO_KEY: "replace-with-a-long-random-secret"
  # Leave empty when AI_PROVIDER=mock.
  OPENAI_API_KEY: ""
