services:
  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      # SQLite file lives inside the mounted volume.
      DATABASE_PATH: /data/sautiledger.db
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SUBMISSION_HASH_SALT: ${SUBMISSION_HASH_SALT:-local-dev-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-local-dev-change-me}
      INSTITUTION_DEMO_KEY: ${INSTITUTION_DEMO_KEY:-demo-institution-key}
      CORS_ORIGIN: http://localhost:3000
      SERVE_STATIC_FRONTEND: "true"
    ports:
      - "3000:3000"
    volumes:
      - sautiledger_data:/data

volumes:
  sautiledger_data:
